<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foxit EV Calculator</title>
  <style>
    :root {
      --ink: #0a0e1a;
      --paper: #f5f3ee;
      --card: #fffdf8;
      --rule: #d8d2c4;
      --accent: #b8472e;
      --muted: #6b7384;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(184, 71, 46, 0.06), transparent 35%),
        radial-gradient(circle at 85% 90%, rgba(201, 161, 74, 0.08), transparent 35%),
        var(--paper);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .wrap {
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--rule);
      box-shadow: 0 16px 50px rgba(10, 14, 26, 0.10);
      padding: 44px 48px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 72px;
      height: 4px;
      background: var(--accent);
    }

    .eyebrow {
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-family: Georgia, "Songti SC", "SimSun", serif;
      font-weight: 500;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 18px;
    }

    h1 em {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    .desc {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
      max-width: 680px;
      margin-bottom: 34px;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--ink);
      transition: 0.18s ease;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }

    .btn-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-secondary {
      color: var(--ink);
      background: transparent;
    }

    .btn-secondary:hover {
      background: var(--ink);
      color: var(--paper);
      transform: translateY(-1px);
    }

    .note {
      margin-top: 30px;
      padding-top: 18px;
      border-top: 1px dashed var(--rule);
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 34px 24px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">FOXIT · VALUATION MODEL</div>
      <h1>Foxit EV 测算<br><em>WR40 Calculator</em></h1>
      <p class="desc">
        点击下方按钮进入 EV / Revenue、Rule of 40、WR40 及 Jefferies Benchmark 测算页面。
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="./Foxit_EV_WR40_Calculator_V2.html">
          打开测算器
        </a>
        <a class="btn btn-secondary" href="./Foxit_EV_WR40_Calculator_V2.html" target="_blank" rel="noopener">
          新窗口打开
        </a>
      </div>

      <div class="note">
        Deploy note: 请将本 index.html 与 Foxit_EV_WR40_Calculator_V2.html 放在 GitHub Pages 同一目录下。<br>
        GitHub Pages 访问根路径时会自动加载 index.html。
      </div>
    </section>
  </main>
</body>
</html>
